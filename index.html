<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A 検索ナビゲーション</title>
    <style>
        /* --- CSS Variables & Reset --- */
        :root {
            --primary: #3b82f6; /* Blue 500 */
            --primary-dark: #2563eb; /* Blue 600 */
            --bg-body: #f9fafb; /* Gray 50 */
            --bg-card: #ffffff;
            --text-main: #1f2937; /* Gray 800 */
            --text-muted: #6b7280; /* Gray 500 */
            --border: #e5e7eb; /* Gray 200 */
            --highlight: #fef08a; /* Yellow 200 */
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 0.5rem;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --header-height: 70px;
            --sidebar-width: 260px;
        }

        /* Dark Mode colors */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #111827; /* Gray 900 */
                --bg-card: #1f2937; /* Gray 800 */
                --text-main: #f3f4f6; /* Gray 100 */
                --text-muted: #9ca3af; /* Gray 400 */
                --border: #374151; /* Gray 700 */
                --highlight: #854d0e; /* Yellow 800 */
                --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.3);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            overflow: hidden; 
        }

        /* --- Layout --- */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header --- */
        header {
            height: var(--header-height);
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 40;
            box-shadow: var(--shadow);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border-radius: 9999px;
            border: 1px solid var(--border);
            background-color: var(--bg-body);
            color: var(--text-main);
            font-size: 1rem;
            transition: var(--transition);
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background-color: var(--bg-card);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* --- Main Content Layout --- */
        .main-wrapper {
            display: flex;
            flex: 1;
            margin-top: var(--header-height);
            overflow: hidden;
        }

        /* --- Sidebar --- */
        aside {
            width: var(--sidebar-width);
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            transition: var(--transition);
            z-index: 30;
        }

        .sidebar-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .category-item:hover {
            background-color: var(--bg-body);
        }

        .category-item.active {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            font-weight: 600;
        }
        
        @media (prefers-color-scheme: dark) {
            .category-item.active {
                background-color: rgba(59, 130, 246, 0.2);
            }
        }

        .category-count {
            font-size: 0.75rem;
            background-color: var(--border);
            color: var(--text-muted);
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
        }
        
        .category-item.active .category-count {
            background-color: var(--primary);
            color: white;
        }

        /* --- Content Area --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        .content-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        #resultStats {
            color: var(--text-muted);
        }

        /* --- QA Cards --- */
        .qa-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .qa-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: var(--transition);
            overflow: hidden;
        }

        .qa-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .qa-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background-color: rgba(0,0,0,0.01);
            display: flex;
            align-items: start;
            gap: 1rem;
        }
        
        @media (prefers-color-scheme: dark) {
            .qa-header { background-color: rgba(255,255,255,0.01); }
        }

        .question-icon {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.25rem;
            margin-top: 0.1rem;
        }

        .qa-question {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            flex: 1;
        }

        .qa-body {
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        .answer-icon {
            color: var(--text-muted);
            font-weight: bold;
            font-size: 1.25rem;
        }

        .qa-answer {
            color: var(--text-main);
            white-space: pre-wrap;
            flex: 1;
        }
        
        .qa-footer {
            padding: 0.75rem 1.5rem;
            background-color: var(--bg-body);
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .qa-breadcrumb {
            display: inline-flex;
            gap: 0.5rem;
            align-items: center;
        }

        .qa-breadcrumb span::after {
            content: " > ";
            color: var(--border);
        }
        .qa-breadcrumb span:last-child::after {
            content: "";
        }

        /* Highlight style */
        mark {
            background-color: var(--highlight);
            color: inherit;
            border-radius: 2px;
            padding: 0 2px;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            background-color: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .no-results-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        /* --- Responsive Styles --- */
        @media (max-width: 768px) {
            :root {
                --sidebar-width: 100%;
            }
            header { padding: 0 1rem; }
            .brand span { display: none; }
            @media (min-width: 400px) { .brand span { display: inline; } }
            .menu-toggle { display: block; margin-right: 0.5rem; }
            aside {
                position: fixed; top: var(--header-height); left: -100%;
                height: calc(100vh - var(--header-height)); box-shadow: var(--shadow-lg); border-right: none;
            }
            aside.open { left: 0; }
            main { padding: 1rem; }
            .content-header { flex-direction: column; align-items: start; gap: 0.5rem; margin-bottom: 1rem; }
            .qa-header, .qa-body { padding: 1rem; }
        }
    </style>
</head>

    const ALL_CATEGORIES = "すべて";
    let currentCategory = ALL_CATEGORIES;
    let searchTerm = "";
    
    const els = {
        searchInput: document.getElementById('searchInput'),
        categoryList: document.getElementById('categoryList'),
        qaGrid: document.getElementById('qaGrid'),
        currentCategoryTitle: document.getElementById('currentCategoryTitle'),
        resultStats: document.getElementById('resultStats'),
        sidebar: document.getElementById('sidebar'),
        menuToggle: document.getElementById('menuToggle'),
        mainContent: document.getElementById('mainContent')
    };

    function init() {
        renderSidebar();
        renderQA();
        
        els.searchInput.addEventListener('input', handleSearch);
        els.menuToggle.addEventListener('click', toggleMobileMenu);
        els.mainContent.addEventListener('click', () => {
            if (els.sidebar.classList.contains('open')) {
                els.sidebar.classList.remove('open');
            }
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function highlightText(text, query) {
        if (!query || query.trim() === "") return escapeHtml(text);
        const escapedText = escapeHtml(text);
        const escapedQuery = query.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escapedQuery})`, 'gi');
        return escapedText.replace(regex, '<mark>$1</mark>');
    }

    // cat1 を基準にカウントする
    function getCategoryCounts() {
        const counts = rawData.reduce((acc, item) => {
            const cat = item.cat1 || '未分類';
            acc[cat] = (acc[cat] || 0) + 1;
            return acc;
        }, {});
        counts[ALL_CATEGORIES] = rawData.length;
        return counts;
    }

    function getFilteredData() {
        return rawData.filter(item => {
            const itemCat1 = item.cat1 || '未分類';
            const categoryMatch = (currentCategory === ALL_CATEGORIES) || (itemCat1 === currentCategory);
            
            let searchMatch = true;
            if (searchTerm) {
                const lowerSearch = searchTerm.toLowerCase();
                searchMatch = (item.question || "").toLowerCase().includes(lowerSearch) || 
                              (item.answer || "").toLowerCase().includes(lowerSearch) ||
                              (item.cat1 || "").toLowerCase().includes(lowerSearch) ||
                              (item.cat2 || "").toLowerCase().includes(lowerSearch) ||
                              (item.cat3 || "").toLowerCase().includes(lowerSearch);
            }
            return categoryMatch && searchMatch;
        });
    }

    function renderSidebar() {
        const counts = getCategoryCounts();
        const categories = [...new Set(rawData.map(item => item.cat1 || '未分類'))].sort();
        const finalCategories = [ALL_CATEGORIES, ...categories];

        els.categoryList.innerHTML = finalCategories.map(cat => `
            <li class="category-item ${cat === currentCategory ? 'active' : ''}" data-category="${escapeHtml(cat)}">
                <span>${escapeHtml(cat)}</span>
                <span class="category-count">${counts[cat] || 0}</span>
            </li>
        `).join('');

        document.querySelectorAll('.category-item').forEach(el => {
            el.addEventListener('click', () => {
                currentCategory = el.dataset.category;
                els.sidebar.classList.remove('open');
                renderSidebar();
                renderQA();
            });
        });
    }

    function renderQA() {
        const filteredData = getFilteredData();
        
        els.currentCategoryTitle.textContent = currentCategory;
        
        if (searchTerm) {
            els.resultStats.innerHTML = `「<b>${escapeHtml(searchTerm)}</b>」の検索結果: <b>${filteredData.length}</b> 件`;
        } else {
            els.resultStats.textContent = `全 ${filteredData.length} 件`;
        }

        if (filteredData.length === 0) {
            els.qaGrid.innerHTML = `
                <div class="no-results">
                    <span class="no-results-icon">∅</span>
                    <h3>一致する質問が見つかりませんでした</h3>
                    <p>別のキーワードをお試しいただくか、カテゴリーを変更してください。</p>
                </div>
            `;
            return;
        }

        els.qaGrid.innerHTML = filteredData.map(item => `
            <div class="qa-card" data-id="${item.id}">
                <div class="qa-header">
                    <span class="question-icon" aria-hidden="true">Q.</span>
                    <h3 class="qa-question">${highlightText(item.question, searchTerm)}</h3>
                </div>
                <div class="qa-body">
                    <span class="answer-icon" aria-hidden="true">A.</span>
                    <p class="qa-answer">${highlightText(item.answer, searchTerm)}</p>
                </div>
                <div class="qa-footer">
                    <div class="qa-breadcrumb">
                        <span>${highlightText(item.cat1, searchTerm)}</span>
                        <span>${highlightText(item.cat2, searchTerm)}</span>
                        <span>${highlightText(item.cat3, searchTerm)}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function handleSearch(e) {
        searchTerm = e.target.value;
        renderQA();
    }

    function toggleMobileMenu() {
        els.sidebar.classList.toggle('open');
    }

    init();

</script>
